<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính BMI</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .box {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>TÍNH CHỈ SỐ BMI</h2>

    <form method="post" action="BMI">
        Chiều cao (m):
        <input type="number" step="0.01" name="height" required>

        Cân nặng (kg):
        <input type="number" step="0.1" name="weight" required>

        <button type="submit">Tính BMI</button>
    </form>
</div>

</body>
</html>

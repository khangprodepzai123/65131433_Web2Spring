<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title th:text="${tieuDeTrang}">Danh sách tin</title></head>
<body>
    <a href="/">← Dashboard</a>
    <h1 th:text="${tieuDeTrang}">Danh sách tin</h1>

    <h3>Lọc theo thể loại:</h3>
    <a href="/tin">[Tất cả]</a>
    <span th:each="tl : ${danhSachTheLoai}">
        | <a th:href="@{/tin/the-loai/{id}(id=${tl.id})}" th:text="${tl.tenTheLoai}"></a>
    </span>

    <br><br>
    <table border="1" cellpadding="8">
        <thead>
            <tr><th>#</th><th>Tiêu đề</th><th>Thể loại</th><th>Người đăng</th><th>Ngày đăng</th></tr>
        </thead>
        <tbody>
            <tr th:each="tin, i : ${danhSachTin}">
                <td th:text="${i.count}"></td>
                <td><a th:href="@{/tin/{id}(id=${tin.id})}" th:text="${tin.tieuDe}"></a></td>
                <td th:text="${tin.theLoaiTin.tenTheLoai}"></td>
                <td th:text="${tin.nguoiDung.hoTen}"></td>
                <td th:text="${#temporals.format(tin.ngayDang, 'dd/MM/yyyy HH:mm')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachTin)}">
                <td colspan="5">Không có tin nào.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>

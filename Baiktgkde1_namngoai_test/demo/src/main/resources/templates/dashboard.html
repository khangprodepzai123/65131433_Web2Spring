<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 14px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #000;
      padding: 6px 10px;
    }
    .header .logo-text { font-size: 12px; font-weight: bold; }

    .wrapper {
      display: flex;
      border: 1px solid #000;
      border-top: none;
      min-height: 400px;
    }

    .sidebar {
      width: 160px;
      border-right: 1px solid #000;
      flex-shrink: 0;
    }
    .sidebar .nav-title {
      padding: 7px 10px;
      border-bottom: 1px solid #000;
      font-weight: bold;
    }
    .sidebar a {
      display: block;
      padding: 7px 10px;
      border-bottom: 1px solid #000;
      text-decoration: none;
      color: #000;
      font-size: 13px;
    }
    .sidebar a:hover { background: #eee; }

    .content { flex: 1; padding: 16px; }

    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    table th, table td { border: 1px solid #000; padding: 6px 10px; text-align: left; }
    table th { background: #f0f0f0; font-weight: bold; }
    h3 { margin-bottom: 8px; }

    .footer {
      text-align: center;
      border: 1px solid #000;
      border-top: none;
      padding: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-text">TRƯỜNG ĐẠI HỌC NHA TRANG<br>KHOA CÔNG NGHỆ THÔNG TIN</div>
    <div>[UserName]</div>
  </div>

  <div class="wrapper">
    <div class="sidebar">
      <div class="nav-title">Dashboard</div>
      <a href="#">Page - List</a>
      <a href="#">Page - Addnew</a>
      <a href="#">Post - List</a>
      <a href="#">Post - Addnew</a>
    </div>

    <div class="content">

      <!-- DANH SÁCH PAGE -->
      <h3>Danh sách Page</h3>
      <table>
        <tr>
          <th>ID</th>
          <th>Page Name</th>
          <th>Keyword</th>
          <th>Content</th>
          <th>Parent Page ID</th>
        </tr>
        <tr th:each="p : ${pageList}">
          <td th:text="${p.id}"></td>
          <td th:text="${p.pageName}"></td>
          <td th:text="${p.keyword}"></td>
          <td th:text="${p.content}"></td>
          <td th:text="${p.parentPageId}"></td>
        </tr>
      </table>

      <!-- DANH SÁCH POST -->
      <h3>Danh sách Post</h3>
      <table>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Content</th>
          <th>Category ID</th>
        </tr>
        <tr th:each="p : ${postList}">
          <td th:text="${p.id}"></td>
          <td th:text="${p.title}"></td>
          <td th:text="${p.content}"></td>
          <td th:text="${p.categoryId}"></td>
        </tr>
      </table>

    </div>
  </div>

  <div class="footer">©2025 by Student Name – FIT.NTU</div>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 14px; }

   
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #000;
      padding: 6px 10px;
    }
    .header .logo-text { font-size: 12px; font-weight: bold; }
    .header .username { font-size: 13px; }

 
    .wrapper {
      display: flex;
      border: 1px solid #000;
      border-top: none;
      min-height: 400px;
    }

   
    .sidebar {
      width: 160px;
      border-right: 1px solid #000;
      flex-shrink: 0;
    }
    .sidebar .nav-title {
      padding: 7px 10px;
      border-bottom: 1px solid #000;
      font-weight: bold;
    }
    .sidebar a {
      display: block;
      padding: 7px 10px;
      border-bottom: 1px solid #000;
      text-decoration: none;
      color: #000;
      font-size: 13px;
    }
    .sidebar a:hover { background: #eee; }

  
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #555;
    }

   
    .footer {
      text-align: center;
      border: 1px solid #000;
      border-top: none;
      padding: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo-text">TRƯỜNG ĐẠI HỌC NHA TRANG<br>KHOA CÔNG NGHỆ THÔNG TIN</div>
    <div class="username">[UserName]</div>
  </div>

  <!-- SIDEBAR + CONTENT -->
  <div class="wrapper">
    <div class="sidebar">
      <div class="nav-title">Dasdboard</div>
      <a href="#">Page -List</a>
      <a href="#">Page -Addnew</a>
      <a href="#">Post -List</a>
      <a href="#">Post -Addnew</a>
    </div>
    <div class="content">
      Content
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">©2025 by Student Name – FIT.NTU</div>

</body>
</html>

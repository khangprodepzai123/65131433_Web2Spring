<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
	    *{
	    margin:0;
	    padding:0;
	    box-sizing:border-box;
	    font-family: Arial, sans-serif;
		}
		
		.container{
		    width:100%;
		    height:100vh;
		    display:flex;
		    flex-direction:column;
		}
		
		/* HEADER */

		.header{
		    height:80px;
		    background:linear-gradient(90deg,#1f3c88,#3a7bd5);
		    color:white;
		    display:flex;
		    justify-content:space-between;
		    align-items:center;
		    padding:0 25px;
		    box-shadow:0 2px 5px rgba(0,0,0,0.2);
		}
		
		.logo{
		    display:flex;
		    align-items:center;
		    gap:15px;
		}
		
		.logo img{
		    width:55px;
		    height:55px;
		    border-radius:50%;
		    background:white;
		    padding:4px;
		}
		
		.logo div{
		    display:flex;
		    flex-direction:column;
		}
		
		.logo div div:first-child{
		    font-size:16px;
		    font-weight:bold;
		}
		
		.logo div div:last-child{
		    font-size:13px;
		    opacity:0.9;
		}
		
		/* USER */
		
		.user{
		    background:rgba(255,255,255,0.2);
		    padding:8px 15px;
		    border-radius:20px;
		    font-weight:bold;
		    font-size:14px;
		}
		
		/* MAIN */
		
		.main{
		    flex:1;
		    display:flex;
		}
		
		/* SIDEBAR */
		
		.sidebar{
		    width:220px;
		    background:#2c3e50;
		    color:white;
		    border-right:2px solid #ddd;
		}
		
		.sidebar ul{
		    list-style:none;
		}
		
		.sidebar li{
		    border-bottom:1px solid rgba(255,255,255,0.1);
		}
		
		.sidebar a{
		    display:block;
		    padding:12px 15px;
		    text-decoration:none;
		    color:white;
		    font-size:14px;
		    transition:0.3s;
		}
		
		/* Title dashboard */
		
		.sidebar .title a{
		    background:#1a252f;
		    font-weight:bold;
		    font-size:16px;
		}
		
		/* Hover effect */
		
		.sidebar a:hover{
		    background:#3498db;
		    padding-left:22px;
		}
		
		/* Active style */
		
		.sidebar a:active{
		    background:#2980b9;
		}
		
		/* CONTENT */
		
		.content{
		    flex:1;
		    border:1px solid #999;
		    display:flex;
		    justify-content:center;
		    align-items:center;
		}
		
		.table-container{
		    width:90%;
		}
		
		.page-table{
		    width:100%;
		    border-collapse:collapse;
		}
		
		.page-table th,
		.page-table td{
		    border:1px solid #999;
		    padding:8px;
		    text-align:center;
		}
		
		.page-table th{
		    background:#f2f2f2;
		}
		
		.page-table a{
		    text-decoration:none;
		    color:blue;
		}
		
		/* FOOTER */
		
		.footer{
		    height:40px;
		    border:1px solid #999;
		    text-align:center;
		    line-height:40px;
		}
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img src="/logoNtu.jpg" alt="logo">
            <div>
                <div>TRƯỜNG ĐẠI HỌC NHA TRANG</div>
                <div>KHOA CÔNG NGHỆ THÔNG TIN</div>
            </div>
        </div>

        <div class="user">
            Phan Sĩ Thành
        </div>
    </header>

    <!-- MAIN -->
    <div class="main">

        <!-- SIDEBAR -->
		<aside class="sidebar">
		    <ul>
		        <li class="title"><a href="/">Dashboard</a></li>
		        <li><a href="/page/all">Page - List</a></li>
		        <li><a href="#">Page - Addnew</a></li>
		        <li><a href="#">Post - List</a></li>
		        <li><a href="#">Post - Addnew</a></li>
		    </ul>
		</aside>

        <!-- CONTENT -->
		<section class="content">
		
		    <div class="table-container">
		
		        <table class="page-table">
		            <thead>
		                <tr>
		                    <th>Id</th>
		                    <th>Pagename</th>
		                    <th>ParentPageId</th>
		                    <th colspan="3">Action</th>
		                </tr>
		            </thead>
		
		            <tbody>
		
		                <tr th:each="p : ${lstPages}">
		                    <td th:text="${p.id}"></td>
		                    <td th:text="${p.pageName}"></td>
		                    <td th:text="${p.parentPageId}"></td>
		
		                    <td><a href="#">view</a></td>
		                    <td><a href="#">delete</a></td>
		                </tr>
		
		            </tbody>
		        </table>
		
		    </div>
		
		</section>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        ©2025 by Phan Sĩ Thành – FIT.NTU
    </footer>

</div>

</body>
</html>
